# ─── Soroban Studio Backend ───────────────────────────────────────
# Run with: docker compose up --build
#
# Architecture:
#   backend         → Go API server (POST /run, WS /ws)
#   soroban-runner  → Shared Rust container for compiling contracts
#
# The backend sends `docker exec` commands to soroban-runner
# to compile user-submitted Soroban projects. Output is streamed
# in real-time via WebSocket.

services:
  # ── Go Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soroban-backend
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      # Mount Docker socket so backend can run `docker exec`
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared workspace volume for project files
      - workspace:/app/workspaces
    environment:
      - PORT=${PORT:-8080}
      - MAX_WORKERS=${MAX_WORKERS:-3}
      - RUNNER_CONTAINER=${RUNNER_CONTAINER:-soroban-runner}
      - WORKSPACE_DIR=${WORKSPACE_DIR:-/app/workspaces}
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
    depends_on:
      soroban-runner:
        condition: service_started
    restart: unless-stopped

  # ── Soroban Compilation Runner ──────────────────────────────────
  soroban-runner:
    build:
      context: ./docker/runner
      dockerfile: Dockerfile
    container_name: soroban-runner
    volumes:
      # Same shared workspace volume
      - workspace:/app/workspaces
      # Global target cache for snappier builds across sessions
      - target_cache:/app/target
      # Global sccache volume
      - sccache:/app/sccache
      # Global cargo home volume
      - cargo_home:/app/cargo
      - stellar_config:/root/.config/stellar
    # Keep container alive to receive `docker exec` commands
    command: ["sh", "-c", "sccache --start-server && tail -f /dev/null"]
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    restart: unless-stopped

# Shared named volumes
volumes:
  workspace:
  target_cache:
  sccache:
  cargo_home:
  stellar_config:
